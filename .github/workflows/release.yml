name: Multi-Platform Release

# Triggers: push a tag X.Y.Z to start full build + signed release
on:
  push:
    tags: ['[0-9]*.[0-9]*.[0-9]*']
  workflow_dispatch:
    inputs:
      sign_macos:
        description: 'Sign and notarize macOS builds'
        type: boolean
        default: false
      publish_only:
        description: 'Skip builds — enter run ID of a previous successful build to publish those artifacts'
        type: string
        default: ''
      tag_name:
        description: 'Tag to publish to (e.g. 0.10.47) — required when using publish_only'
        type: string
        default: ''

# ── Required GitHub Secrets ──────────────────────────────────────────────────
# GPG_PRIVATE_KEY                  base64-encoded GPG private key (gpg --export-secret-keys | base64)
# GPG_PASSPHRASE                   passphrase protecting the GPG key
# MACOS_CERT_BASE64                base64-encoded Developer ID .p12 (base64 -i cert.p12)
# MACOS_CERT_PASSWORD              password used when exporting the .p12
# APP_STORE_CONNECT_API_KEY        base64-encoded App Store Connect .p8 API key
# APP_STORE_CONNECT_KEY_ID         App Store Connect API Key ID (e.g. ABC1234567)
# APP_STORE_CONNECT_ISSUER_ID      App Store Connect Issuer UUID
# ─────────────────────────────────────────────────────────────────────────────

env:
  BINARIES: "XTCASHnetwork cmdwallet cmdwalletbeta XTCASHservice XTCASHwalletapi MINER walletupgrader cryptotest"
  GPG_FINGERPRINT: "9A9F4ABE01A7CC6D0474035D753023588E030016"
  GPG_IDENTITY: "TRRXITTE Int., incorporate <integration@trrxitte.com>"
  APPLE_SIGNING_IDENTITY: "Developer ID Application: Christian Benz (MC52ZBYMUT)"

jobs:

  # ── macOS arm64 (Apple Silicon) ─────────────────────────────────────────────
  build-macos-arm64:
    name: macOS arm64
    runs-on: macos-14
    if: github.event.inputs.publish_only == ''
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Install dependencies
        run: |
          brew install boost openssl cmake ninja
          # Use GITHUB_ENV — never ::set-env:: or ::add-path::
          echo "OPENSSL_ROOT=$(brew --prefix openssl)" >> "$GITHUB_ENV"
          echo "$(brew --prefix ninja)/bin" >> "$GITHUB_PATH"

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DARCH=default -DSTATIC=ON \
            -DOPENSSL_ROOT_DIR="${OPENSSL_ROOT}"

      - name: Build
        run: cmake --build build --parallel $(sysctl -n hw.logicalcpu)

      - name: Collect binaries
        run: |
          mkdir -p dist
          for b in $BINARIES; do
            [ -f "build/src/$b" ] && cp "build/src/$b" dist/
          done
          for f in dist/*; do echo "$f: $(lipo -archs "$f")"; done

      - name: Import certificate
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.sign_macos == 'true'
        env:
          MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KC="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "" "$KC"
          security list-keychain -d user -s "$KC"
          echo "$MACOS_CERT_BASE64" | tr -d '\n\r\t ' | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KC" \
            -P "$MACOS_CERT_PASSWORD" -f pkcs12 -A \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KC"

      - name: Sign binaries
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.sign_macos == 'true'
        env:
          SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        run: |
          for f in dist/*; do
            codesign --force --options runtime --timestamp \
              --sign "$SIGNING_IDENTITY" "$f"
            codesign --verify --verbose "$f"
          done

      - name: Package DMG
        run: |
          hdiutil create -volname "traaittXTCASH-arm64" \
            -srcfolder dist -ov -format UDZO \
            traaittXTCASH-macos-arm64.dmg

      - name: Notarize + Staple
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.sign_macos == 'true'
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          echo "$APP_STORE_CONNECT_API_KEY" | base64 --decode > "$RUNNER_TEMP/notary-key.p8"
          xcrun notarytool submit traaittXTCASH-macos-arm64.dmg \
            --key "$RUNNER_TEMP/notary-key.p8" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait
          xcrun stapler staple traaittXTCASH-macos-arm64.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: traaittXTCASH-macos-arm64.dmg

  # ── macOS x86_64 (Intel) ────────────────────────────────────────────────────
  build-macos-x86_64:
    name: macOS x86_64
    runs-on: macos-15-intel
    if: github.event.inputs.publish_only == ''
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Install dependencies
        run: |
          brew install boost openssl cmake ninja
          echo "OPENSSL_ROOT=$(brew --prefix openssl)" >> "$GITHUB_ENV"
          echo "$(brew --prefix ninja)/bin" >> "$GITHUB_PATH"

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 \
            -DARCH=default -DSTATIC=ON \
            -DOPENSSL_ROOT_DIR="${OPENSSL_ROOT}"

      - name: Build
        run: cmake --build build --parallel $(sysctl -n hw.logicalcpu)

      - name: Collect binaries
        run: |
          mkdir -p dist
          for b in $BINARIES; do
            [ -f "build/src/$b" ] && cp "build/src/$b" dist/
          done

      - name: Import certificate
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.sign_macos == 'true'
        env:
          MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KC="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "" "$KC"
          security list-keychain -d user -s "$KC"
          echo "$MACOS_CERT_BASE64" | tr -d '\n\r\t ' | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KC" \
            -P "$MACOS_CERT_PASSWORD" -f pkcs12 -A \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KC"

      - name: Sign binaries
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.sign_macos == 'true'
        env:
          SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        run: |
          for f in dist/*; do
            codesign --force --options runtime --timestamp \
              --sign "$SIGNING_IDENTITY" "$f"
          done

      - name: Package DMG
        run: |
          hdiutil create -volname "traaittXTCASH-x86_64" \
            -srcfolder dist -ov -format UDZO \
            traaittXTCASH-macos-x86_64.dmg

      - name: Notarize + Staple
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.sign_macos == 'true'
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          echo "$APP_STORE_CONNECT_API_KEY" | base64 --decode > "$RUNNER_TEMP/notary-key.p8"
          xcrun notarytool submit traaittXTCASH-macos-x86_64.dmg \
            --key "$RUNNER_TEMP/notary-key.p8" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait
          xcrun stapler staple traaittXTCASH-macos-x86_64.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64
          path: traaittXTCASH-macos-x86_64.dmg

  # ── Linux x86_64 ────────────────────────────────────────────────────────────
  build-linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    if: github.event.inputs.publish_only == ''
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libboost-thread-dev libboost-date-time-dev \
            libboost-chrono-dev libboost-serialization-dev \
            libssl-dev

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release -DARCH=default -DSTATIC=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Package
        run: |
          mkdir -p dist
          for b in $BINARIES; do
            [ -f "build/src/$b" ] && cp "build/src/$b" dist/
          done
          tar -czf traaittXTCASH-linux-x86_64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: traaittXTCASH-linux-x86_64.tar.gz

  # ── Linux aarch64 ───────────────────────────────────────────────────────────
  build-linux-aarch64:
    name: Linux aarch64
    runs-on: ubuntu-22.04-arm
    if: github.event.inputs.publish_only == ''
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build \
            libboost-thread-dev libboost-date-time-dev \
            libboost-chrono-dev libboost-serialization-dev \
            libssl-dev

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DARCH=default -DSTATIC=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Package
        run: |
          mkdir -p dist
          for b in $BINARIES; do
            [ -f "build/src/$b" ] && cp "build/src/$b" dist/
          done
          tar -czf traaittXTCASH-linux-aarch64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64
          path: traaittXTCASH-linux-aarch64.tar.gz

  # ── Windows x86_64 ──────────────────────────────────────────────────────────
  build-windows-x86_64:
    name: Windows x86_64
    runs-on: windows-2022
    if: github.event.inputs.publish_only == ''
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-x64-windows-static-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: vcpkg-x64-windows-static-

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\vcpkg")) {
            git clone --depth=1 https://github.com/microsoft/vcpkg.git C:\vcpkg
          }
          C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          # Use GITHUB_ENV — never ::set-env::
          "VCPKG_ROOT=C:\vcpkg" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          C:\vcpkg\vcpkg.exe install `
            boost-thread boost-date-time boost-chrono boost-serialization `
            boost-uuid boost-multi-index boost-variant boost-optional `
            boost-algorithm boost-range boost-functional boost-utility `
            boost-iterator boost-scope-exit boost-format boost-foreach boost-integer `
            openssl --triplet x64-windows-static

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release -DSTATIC=ON -DARCH=default `
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          "XTCASHnetwork","cmdwallet","cmdwalletbeta","XTCASHservice","XTCASHwalletapi","MINER","walletupgrader","cryptotest" | ForEach-Object {
            $src = "build\src\Release\$_.exe"
            if (Test-Path $src) { Copy-Item $src dist\ }
          }
          Compress-Archive -Path dist\* -DestinationPath traaittXTCASH-windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: traaittXTCASH-windows-x86_64.zip

  # ── GPG Sign + Publish Release ───────────────────────────────────────────────
  release:
    name: Publish Release
    needs:
      - build-macos-arm64
      - build-macos-x86_64
      - build-linux-x86_64
      - build-linux-aarch64
      - build-windows-x86_64
    runs-on: ubuntu-latest
    if: always() && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download artifacts (from this run)
        if: github.event.inputs.publish_only == ''
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Download artifacts (from publish_only run ID)
        if: github.event.inputs.publish_only != ''
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.inputs.publish_only }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum *.dmg *.tar.gz *.zip 2>/dev/null | tee SHA256SUMS.txt || true

      - name: Build release notes
        id: notes
        run: |
          VERSION="${{ github.ref_name }}"
          CHECKSUMS=$(cat artifacts/SHA256SUMS.txt 2>/dev/null || echo "unavailable")
          cat > release_body.md << RELEASE_EOF
          ## traaittXTCASH ${VERSION} — $(date -u '+%B %d, %Y')

          Full multi-platform release of the TRRXITTE XTCASH network binaries.

          ---

          ### Platforms

          | Artifact | Platform |
          |----------|----------|
          | \`traaittXTCASH-macos-arm64.dmg\` | macOS Apple Silicon (arm64) |
          | \`traaittXTCASH-macos-x86_64.dmg\` | macOS Intel (x86_64) |
          | \`traaittXTCASH-linux-x86_64.tar.gz\` | Linux x86_64 (static) |
          | \`traaittXTCASH-linux-aarch64.tar.gz\` | Linux ARM64 (static) |
          | \`traaittXTCASH-windows-x86_64.zip\` | Windows x86_64 |

          ---

          ### SHA256 Checksums

          \`\`\`
          ${CHECKSUMS}
          \`\`\`

          ---

          See [commits](https://github.com/TRRXITTE/traaittXTCASH/commits/${VERSION}) for full changelog.
          RELEASE_EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          body_path: release_body.md
          generate_release_notes: false
          files: |
            artifacts/*.dmg
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/SHA256SUMS.txt
